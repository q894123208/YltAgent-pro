llm:
  api_key: ""
  base_url: "https://www.dmxapi.cn/v1"
  model_name: "gemini-3.1-flash-lite"
  api_type: "auto"
  auth_scheme: "raw"
  reasoning_effort: "none"
  temperature: 0.3
  max_tokens: 1800
  max_retries: 1

vlm:
  api_key: ""
  base_url: "https://www.dmxapi.cn/v1"
  model_name: "gemini-3.1-flash-lite"
  temperature: 0.1
  max_tokens: 4096

embedding:
  # provider 可选: local / api / dmxapi / auto
  # local: 使用 local_model_path 本地加载
  # dmxapi/api: 调用 base_url + /embeddings 远程接口
  # auto: local_model_path 存在则本地，否则远程 API
  # 使用 DMXAPI 时，把 provider 改为 dmxapi，base_url 改为 https://www.dmxapi.cn/v1，auth_scheme 改为 raw
  #provider: "local"
  api_key: ""
  #base_url: "https://www.dmxapi.cn/v1"
  #auth_scheme: "raw"
  model_name: "qwen3-Embedding-4B"
  local_model_path: "D:/models/Qwen3-Embedding-4B" # 本地建议用4B，api用8b
  device: "cuda"
  dimensions: 1024
  batch_size: 16
  query_instruction: "Instruct: 根据用户的医疗咨询问题，检索最相关的医学知识和报告内容\nQuery: "

server:
  host: "127.0.0.1"
  port: 8012

rag:
  knowledge_dir: "../data/knowledge_base"
  triage_kb_dir: "../data/medical-triage-kb"
  top_k: 5
  use_chroma: true

chroma:
  persist_dir: "../data/chroma"
  kb_collection: "medical_kb"
  user_reports_collection: "user_reports"
  top_k_kb: 6
  top_k_reports: 4
  chunk_size: 400
  chunk_overlap: 60

upload:
  storage_dir: "../data/uploads"
  max_file_mb: 20
  allowed_extensions: ["png", "jpg", "jpeg", "webp", "bmp", "pdf", "docx", "doc", "xlsx", "xls", "csv"]

database:
  type: "postgresql"
  postgres_url: "postgresql://medix:123456@127.0.0.1:5432/medical_agent"
  #sqlite_path: "../data/runtime/medix_enterprise.db"

features:
  enable_llm: true
  enable_deep_search: true
  enable_mock_when_llm_missing: true
  enable_chroma: true
  enable_vlm_upload: true
  enable_llm_router: true

auth:
  token_secret: "<RANDOM_LONG_TOKEN_SECRET>"
  token_expire_hours: 168
